<!DOCTYPE html>
<html>
<head>
    <title>EasyMart - Login</title>

    {% load static %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: url("{% static 'images/bg.jpeg' %}") no-repeat center/cover;
        }

        .wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: linear-gradient(to right, rgba(0,0,0,0.6), rgba(0,0,0,0.4));
        }

        .portal-card {
            width: 100%;
            max-width: 720px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(25px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            color: white;
        }

        .brand {
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            color: #ffc107;
        }

        .tagline {
            font-size: 13px;
            text-align: center;
            color: #ddd;
            margin-bottom: 28px;
        }

        .login-option {
            display: block;
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 24px;
            height: 100%;
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
        }

        .login-option:hover {
            color: white;
            transform: translateY(-4px);
            background: rgba(255,255,255,0.16);
            border-color: rgba(255,255,255,0.3);
        }

        .login-option .icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .login-option.user .icon { color: #86efac; }
        .login-option.admin .icon { color: #93c5fd; }

        .login-option h5 {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-option p {
            font-size: 13px;
            color: #ddd;
            margin-bottom: 0;
        }

        .back-home {
            color: #ffc107;
            text-decoration: none;
            font-size: 14px;
        }

        .back-home:hover {
            color: #ffd54f;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="portal-card">

        <div class="brand">
            <i class="bi bi-basket2-fill"></i> EasyMart
        </div>

        <div class="tagline">Choose how you want to sign in</div>

        <div class="row g-3">

            <div class="col-md-6">
                <a href="{% url 'accounts:login' %}" class="login-option user">
                    <div class="icon"><i class="bi bi-person-circle"></i></div>
                    <h5>User Login</h5>
                    <p>Shop groceries, track orders, and manage your account.</p>
                </a>
            </div>

            <div class="col-md-6">
                <a href="/admin/login/" class="login-option admin">
                    <div class="icon"><i class="bi bi-shield-lock"></i></div>
                    <h5>Admin Login</h5>
                    <p>Manage products, orders, users, and store settings.</p>
                </a>
            </div>

        </div>

        <p class="text-center mt-4 mb-0">
            <a href="{% url 'products:home' %}" class="back-home">
                <i class="bi bi-arrow-left"></i> Back to store
            </a>
        </p>

    </div>
</div>

</body>
</html>
